<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>튀움 - 홈</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .phone {
      width: 402px;
      height: 874px;
      background: #f3f0e9;
      border-radius: 40px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* 스크롤 영역 */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 0 0 80px 0;
      scrollbar-width: none;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* 인사 섹션 */
    .greeting {
      padding: 60px 24px 16px;
    }
    .greeting-sub {
      font-size: 18px;
      color: #706c64;
      margin-bottom: 4px;
    }
    .greeting-main {
      font-size: 28px;
      font-weight: 700;
      color: rgba(0,0,0,0.85);
      letter-spacing: -1px;
    }

    /* 걸음 수 카드 */
    .steps-card {
      margin: 0 24px 16px;
      background: #bdd795;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.2);
      padding: 14px 16px;
      position: relative;
      overflow: hidden;
    }
    .steps-goal-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .steps-goal-badge {
      background: white;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 5px;
      padding: 2px 8px;
      font-size: 8px;
      font-weight: 700;
      color: #344917;
    }
    .steps-goal-val {
      font-size: 8px;
      font-weight: 700;
      color: #344917;
    }
    .steps-progress-wrap {
      position: relative;
      margin-bottom: 8px;
    }
    .steps-track {
      height: 6px;
      background: #d6e6be;
      border-radius: 3px;
      overflow: hidden;
    }
    .steps-fill {
      height: 6px;
      background: #6a8834;
      border-radius: 3px;
      width: 0%;
      transition: width 1s ease;
    }
    .steps-label {
      font-size: 9px;
      color: rgba(0,0,0,0.5);
      margin-bottom: 4px;
    }
    .steps-val-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .steps-chip {
      background: rgba(255,255,255,0.5);
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 30px;
      padding: 2px 10px;
      font-size: 8px;
      color: #344917;
    }
    .steps-count {
      font-size: 11px;
      font-weight: 700;
      color: #344917;
    }
    .steps-runner {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 40px;
    }

    /* 틔우미 섹션 */
    .tiumy-section {
      margin: 0 24px 16px;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: rgba(0,0,0,0.85);
    }
    .tiumy-card {
      background: rgba(179,215,188,0.31);
      border: 1px solid rgba(0,0,0,0.2);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 1px 1px 2px rgba(0,0,0,0.05);
      cursor: pointer;
      text-decoration: none;
    }
    .tiumy-avatar {
      width: 67px; height: 67px;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(46,125,50,0.8);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      flex-shrink: 0;
    }
    .tiumy-info { flex: 1; }
    .tiumy-name {
      font-size: 16px;
      font-weight: 700;
      color: rgba(0,0,0,0.85);
      margin-bottom: 4px;
    }
    .tiumy-desc {
      font-size: 10px;
      color: #2e7d32;
      line-height: 1.5;
    }
    .tiumy-plant {
      font-size: 10px;
      color: rgba(0,0,0,0.5);
      margin-top: 2px;
    }

    /* 날씨 카드 */
    .weather-card {
      background: rgba(255,255,252,0.9);
      border: 1px solid rgba(0,0,0,0.2);
      border-radius: 10px;
      padding: 10px 14px;
      min-width: 117px;
      flex-shrink: 0;
    }
    .weather-title {
      font-size: 12px;
      color: black;
      font-weight: 400;
      margin-bottom: 6px;
    }
    .weather-date {
      font-size: 9px;
      color: rgba(0,0,0,0.5);
      margin-bottom: 6px;
    }
    .weather-divider {
      height: 0.5px;
      background: rgba(0,0,0,0.15);
      margin-bottom: 6px;
    }
    .weather-row {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: black;
      margin-bottom: 2px;
    }

    /* 보상 섹션 */
    .reward-section {
      margin: 0 24px 16px;
    }
    .reward-card {
      background: rgba(179,215,188,0.31);
      border: 1px solid rgba(0,0,0,0.2);
      border-radius: 10px;
      padding: 14px;
      box-shadow: 1px 1px 2px rgba(0,0,0,0.05);
      position: relative;
      overflow: hidden;
      min-height: 124px;
    }
    .reward-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .reward-locked-text {
      font-size: 18px;
      font-weight: 700;
      color: white;
      text-align: center;
    }
    .reward-items {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 36px;
    }
    .reward-item {
      background: rgba(255,255,255,0.85);
      border-radius: 10px;
      width: 56px; height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .reward-header-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    /* 식물 성장 섹션 */
    .plants-section {
      margin: 0 24px 16px;
    }
    .plants-grid {
      display: grid;
      grid-template-columns: 156px 1fr;
      gap: 8px;
    }
    .plant-main-card {
      background: white;
      border: 1px solid rgba(0,0,0,0.2);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }
    .plant-main-img {
      width: 100%;
      height: 140px;
      object-fit: contain;
      background: #f0ede4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
    }
    .main-badge {
      position: absolute;
      top: 8px; left: 8px;
      background: rgba(51,75,27,0.85);
      border: 2px solid white;
      border-radius: 60px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 700;
      color: white;
    }
    .plant-main-info {
      padding: 8px;
      text-align: center;
      border-top: 0.5px solid rgba(0,0,0,0.15);
    }
    .plant-main-name { font-size: 14px; font-weight: 700; color: black; }
    .plant-main-lv { font-size: 14px; font-weight: 700; color: black; margin-top: 2px; }
    .plants-side {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .plant-side-card {
      background: white;
      border: 1px solid rgba(0,0,0,0.2);
      border-radius: 5px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      cursor: pointer;
      text-decoration: none;
    }
    .plant-side-img {
      width: 61px; height: 58px;
      background: #f0ede4;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .plant-side-img img { width: 100%; height: 100%; object-fit: contain; }
    .plant-side-info { flex: 1; }
    .plant-side-name { font-size: 14px; font-weight: 700; color: black; }
    .plant-side-lv {
      font-size: 12px;
      color: rgba(0,0,0,0.5);
      margin-top: 2px;
      padding-top: 2px;
      border-top: 0.5px solid rgba(0,0,0,0.15);
    }

    /* 하단 탭바 */
    .tabbar {
      position: absolute;
      bottom: 16px;
      left: 27px;
      width: 352px;
      height: 56px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 8px;
      z-index: 10;
    }
    .tab-btn {
      width: 40px; height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      text-decoration: none;
      border-radius: 8px;
    }
    .tab-btn:hover { background: rgba(0,0,0,0.05); }
    .tab-center {
      width: 50px; height: 50px;
      background: #334b1b;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.14);
      margin-top: -10px;
      text-decoration: none;
    }
  </style>
</head>
<body>
<div class="phone">
  <div class="scroll-area">

    <!-- 인사 -->
    <div class="greeting">
      <div class="greeting-sub">안녕하세요, 세은 님 👋</div>
      <div class="greeting-main">오늘도 식물과 함께</div>
    </div>

    <!-- 걸음 수 카드 -->
    <div class="steps-card">
      <div class="steps-goal-row">
        <span class="steps-goal-badge">📍 오늘 목표</span>
        <span class="steps-goal-val">8,000 걸음</span>
      </div>
      <div class="steps-label">오늘 걸음 수</div>
      <div class="steps-progress-wrap">
        <div class="steps-track">
          <div class="steps-fill" id="steps-fill"></div>
        </div>
      </div>
      <div class="steps-val-row">
        <span class="steps-chip" id="steps-chip">오늘 걸음 수</span>
        <span class="steps-count" id="steps-count">0 걸음</span>
      </div>
      <div class="steps-runner">🏃</div>
    </div>

    <!-- 틔우미 + 날씨 -->
    <div style="margin: 0 24px 16px; display: flex; gap: 10px; align-items: flex-start;">

      <!-- 틔우미 -->
      <div style="flex: 1;">
        <div class="section-header">
          <span style="font-size:18px;">🌿</span>
          <span class="section-title">나만의 식물친구, 틔우미</span>
        </div>
        <a href="chatbot.html" style="display:flex; align-items:center; gap:12px; background:rgba(255,255,252,0.9); border:1px solid rgba(46,125,50,0.8); border-radius:30px; padding:10px 14px; text-decoration:none; box-shadow:1px 1px 2px rgba(0,0,0,0.05);">
          <div style="width:40px;height:40px;background:#e8f5e9;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">🌿</div>
          <div>
            <div style="font-size:12px;font-weight:700;color:#2e7d32;">'틔우미'와 대화하며</div>
            <div style="font-size:10px;color:rgba(0,0,0,0.5);">함께 성장하는 하루!</div>
          </div>
        </a>
      </div>

      <!-- 날씨 -->
      <div class="weather-card">
        <div class="weather-title">현재 날씨</div>
        <div class="weather-date" id="weather-date">--/-- ---</div>
        <div class="weather-divider"></div>
        <div class="weather-row">☀️ 낮 기온 <span id="temp">23℃</span></div>
        <div class="weather-row">💧 습도 <span>40%</span></div>
        <div class="weather-row">🌫 미세먼지 <span>좋음</span></div>
      </div>
    </div>

    <!-- 보상 섹션 -->
    <div class="reward-section">
      <div class="section-header">
        <span style="font-size:18px;">🌿</span>
        <span class="section-title">획득 가능한 보상</span>
      </div>
      <div class="reward-card">
        <div class="reward-items">
          <div class="reward-item">🌸</div>
          <div class="reward-item">💊</div>
        </div>
        <div class="reward-overlay" id="reward-overlay">
          <div class="reward-locked-text">걸음 수 달성 시 획득 가능해요!</div>
        </div>
      </div>
    </div>

    <!-- 식물 성장 현황 -->
    <div class="plants-section">
      <div class="section-header">
        <span style="font-size:18px;">🌿</span>
        <span class="section-title">내 식물 성장 현황</span>
      </div>
      <div class="plants-grid">

        <!-- 메인 식물 -->
        <a href="chatbot.html" class="plant-main-card">
          <div class="plant-main-img">🪴</div>
          <div class="main-badge">MAIN</div>
          <div class="plant-main-info">
            <div class="plant-main-name" id="main-plant-name">아레테리아</div>
            <div class="plant-main-lv">Lv.02</div>
          </div>
        </a>

        <!-- 사이드 식물들 -->
        <div class="plants-side">
          <a href="chatbot.html" class="plant-side-card">
            <div class="plant-side-img">🌿</div>
            <div class="plant-side-info">
              <div class="plant-side-name">몬스텔라</div>
              <div class="plant-side-lv">Lv.01</div>
            </div>
          </a>
          <a href="chatbot.html" class="plant-side-card">
            <div class="plant-side-img">🪴</div>
            <div class="plant-side-info">
              <div class="plant-side-name">스파틸루나</div>
              <div class="plant-side-lv">완성!</div>
            </div>
          </a>
          <a href="chatbot.html" class="plant-side-card">
            <div class="plant-side-img">🌱</div>
            <div class="plant-side-info">
              <div class="plant-side-name">드라코블룸</div>
              <div class="plant-side-lv">Lv.04</div>
            </div>
          </a>
        </div>
      </div>
    </div>

  </div>

  <!-- 하단 탭바 -->
  <div class="tabbar">
    <a href="index.html" class="tab-btn">🏠</a>
    <a href="plant-gen.html" class="tab-btn">✏️</a>
    <a href="analysis.html" class="tab-center">⊕</a>
    <a href="plant-gen.html" class="tab-btn">🌿</a>
    <a href="chatbot.html" class="tab-btn">👤</a>
  </div>

</div>

<script>
  // 걸음 수 세팅
  const steps = parseInt(localStorage.getItem('tium_steps') || '6530');
  const goal = 8000;
  const pct = Math.min((steps / goal) * 100, 100);
  const item = localStorage.getItem('tium_item') || 'none';
  const plantName = localStorage.getItem('tium_plant_name') || '아레테리아';

  document.getElementById('steps-fill').style.width = pct + '%';
  document.getElementById('steps-count').textContent = steps.toLocaleString() + ' 걸음';
  document.getElementById('steps-chip').textContent = '오늘 걸음 수';
  document.getElementById('main-plant-name').textContent = plantName;

  // 보상 오버레이
  if (item !== 'none') {
    document.getElementById('reward-overlay').style.display = 'none';
  }

  // 날짜
  const now = new Date();
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  document.getElementById('weather-date').textContent =
    `${now.getMonth()+1}/${now.getDate()} ${days[now.getDay()]}`;
</script>
</body>
</html>
