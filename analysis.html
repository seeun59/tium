<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>튀움 - 방 분위기 분석</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .phone {
      width: 402px;
      height: 874px;
      position: relative;
      overflow: hidden;
      background: #e0e1dd;
      border-radius: 40px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }
    #bg-img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }
    #capture-canvas { display: none; }

    /* 헤더 */
    .header {
      position: absolute;
      top: 42px; left: 45px;
      width: 312px; height: 44px;
      background: rgba(255,255,255,0.92);
      border-radius: 10px;
      border: 0.5px solid rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      z-index: 10;
    }
    .header-title { color: #4CAF50; font-size: 16px; font-weight: 700; }
    .header-badge {
      background: #e8f5e9;
      border-radius: 12px;
      padding: 3px 10px;
      color: #2e7d32;
      font-size: 10px;
      font-weight: 600;
      white-space: nowrap;
    }

    /* 업로드 영역 */
    #upload-area {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #e0e1dd;
      z-index: 5;
    }
    .upload-icon { font-size: 64px; }
    .upload-title { font-size: 18px; font-weight: 700; color: #334b1b; }
    .upload-sub { font-size: 13px; color: #888; text-align: center; line-height: 1.6; }
    .upload-btn {
      margin-top: 8px;
      background: #334b1b;
      color: white;
      border: none;
      border-radius: 14px;
      width: 240px;
      height: 50px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
    }
    #file-input { display: none; }

    /* 로딩 */
    #loading {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      gap: 16px;
    }
    .spinner {
      width: 52px; height: 52px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #4CAF50;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: white; font-size: 14px; text-align: center; line-height: 1.8; }

    /* 바텀 시트 */
    #bottom-sheet {
      position: absolute;
      bottom: 0; left: 0;
      width: 402px;
      height: 510px;
      background: rgba(242,240,233,0.97);
      border-radius: 24px 24px 0 0;
      z-index: 10;
      padding: 16px 0 20px;
      overflow-y: auto;
    }
    .drag-bar {
      width: 40px; height: 4px;
      background: #b2b2ad;
      border-radius: 2px;
      margin: 0 auto 14px;
    }
    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a1a;
      text-shadow: 1px 1px 1px rgba(255,255,255,0.5);
      margin: 0 45px 8px;
    }
    .analysis-card {
      margin: 0 45px 14px;
      background: #f9fbf9;
      border-radius: 10px;
      outline: 0.5px solid rgba(0,0,0,0.2);
      box-shadow: 1px 1px 1px rgba(0,0,0,0.1);
      padding: 10px 14px;
      font-size: 12px;
      color: #333;
      line-height: 20px;
    }
    .recommend-card {
      margin: 0 45px 14px;
      background: #e8f5e9;
      border-radius: 14px;
      outline: 0.5px solid rgba(0,0,0,0.2);
      box-shadow: 1px 1px 1px rgba(0,0,0,0.1);
      padding: 12px 14px;
    }
    .spot-title { font-size: 15px; font-weight: 700; color: #1b5e20; margin-bottom: 6px; }
    .spot-divider { height: 0.3px; background: #1b5e20; margin-bottom: 8px; }
    .spot-location { font-size: 12.5px; font-weight: 700; color: #2e7d32; margin-bottom: 6px; }
    .spot-desc { font-size: 11px; color: #2e592e; line-height: 20px; }
    .ar-btn {
      display: block;
      margin: 4px 45px 0;
      width: 312px;
      height: 50px;
      background: #334b1b;
      color: white;
      border: 2px solid white;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="phone">

  <!-- 배경 이미지 -->
  <img id="bg-img" alt="방 사진">
  <canvas id="capture-canvas" width="402" height="874"></canvas>

  <!-- 헤더 -->
  <div class="header">
    <span class="header-title">🌱 튀움 (Tium)</span>
    <span class="header-badge" id="header-badge">사진을 촬영해주세요</span>
  </div>

  <!-- 업로드 영역 -->
  <div id="upload-area">
    <div class="upload-icon">📷</div>
    <div class="upload-title">방 사진 업로드</div>
    <div class="upload-sub">사진을 촬영하면<br>Gemini 2.0이 방을 분석해드려요</div>
    <button class="upload-btn" onclick="document.getElementById('file-input').click()">
      📸 사진 촬영하기
    </button>
    <input type="file" id="file-input" accept="image/*" onchange="handleUpload(event)">
  </div>

  <!-- 로딩 -->
  <div id="loading" class="hidden">
    <div class="spinner"></div>
    <div class="loading-text">Gemini 2.0 Vision 분석 중...<br>방의 분위기와 채광을 파악하고 있어요 🌱</div>
  </div>

  <!-- 바텀 시트 -->
  <div id="bottom-sheet" class="hidden">
    <div class="drag-bar"></div>
    <p class="section-title">방 분위기 및 채광 분석</p>
    <div class="analysis-card" id="room-analysis">분석 중...</div>
    <p class="section-title">선택한 식물 분석</p>
    <div class="analysis-card" id="plant-analysis">분석 중...</div>
    <div class="recommend-card">
      <div class="spot-title">📍 AI 추천 배치 스팟</div>
      <div class="spot-divider"></div>
      <div class="spot-location" id="spot-location">분석 중...</div>
      <div class="spot-desc" id="spot-desc">분석 중...</div>
    </div>
    <button class="ar-btn" onclick="goToAR()">AR 배치하기</button>
  </div>

</div>
<script>
async function handleUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  // 이미지 미리보기
  const reader = new FileReader();
  reader.onload = async (e) => {
    const bgImg = document.getElementById('bg-img');
    bgImg.src = e.target.result;
    bgImg.style.display = 'block';

    document.getElementById('upload-area').classList.add('hidden');
    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('header-badge').textContent = 'Gemini 분석 중...';

    const base64 = e.target.result.split(',')[1];
    try {
      const result = await analyzeWithGemini(base64);
      showResult(result);
    } catch (err) {
      alert('분석 실패: ' + err.message);
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('upload-area').classList.remove('hidden');
    }
  };
  reader.readAsDataURL(file);
}

async function analyzeWithGemini(base64Image) {
  const prompt = `당신은 인테리어 전문가이자 식물 큐레이터입니다.
이 방 사진을 분석하고 아래 JSON 형식으로만 응답해주세요. 다른 텍스트는 절대 포함하지 마세요.
{
  "room_analysis": "방의 분위기, 채광, 색감을 2-3문장으로 분석",
  "plant_analysis": "이 공간에 어울리는 식물 특성을 2-3문장으로 설명",
  "spot_location": "[구체적인 배치 위치]",
  "spot_desc": "그 위치에 배치하면 좋은 이유를 1-2문장으로"
}`;

  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.GEMINI_FLASH}:generateContent?key=${CONFIG.GEMINI_API_KEY}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { text: prompt },
            { inline_data: { mime_type: 'image/jpeg', data: base64Image } }
          ]
        }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 512 }
      })
    }
  );

  const data = await response.json();
  const text = data.candidates[0].content.parts[0].text;
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

function showResult(result) {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('bottom-sheet').classList.remove('hidden');
  document.getElementById('header-badge').textContent = 'Gemini 2.0 Vision 분석 완료';
  document.getElementById('room-analysis').textContent = result.room_analysis;
  document.getElementById('plant-analysis').textContent = result.plant_analysis;
  document.getElementById('spot-location').textContent = result.spot_location;
  document.getElementById('spot-desc').textContent = result.spot_desc;
}

function goToAR() {
  window.location.href = 'index.html';
}
</script>
</body>
</html>
