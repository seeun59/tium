<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>튀움 - AI 식물 만들기</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .phone {
      width: 402px;
      height: 874px;
      position: relative;
      overflow: hidden;
      background: #f3f0e9;
      border-radius: 40px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }

    /* 헤더 */
    .header {
      background: white;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
      padding: 24px 20px 14px;
      flex-shrink: 0;
    }
    .header-title { color: #1b5e20; font-size: 14px; font-weight: 700; }
    .header-sub { color: #888; font-size: 11px; margin-top: 2px; }

    /* 희귀도 선택 */
    .rarity-section {
      padding: 16px 20px 0;
      flex-shrink: 0;
    }
    .section-label {
      font-size: 12px;
      font-weight: 700;
      color: #334b1b;
      margin-bottom: 10px;
    }
    .rarity-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid #c8dfc8;
      background: white;
      font-size: 12px;
      font-weight: 700;
      color: #4a7a4a;
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip.active {
      background: #334b1b;
      color: white;
      border-color: #334b1b;
    }

    /* 프롬프트 입력 */
    .prompt-section {
      padding: 16px 20px 0;
      flex-shrink: 0;
    }
    .prompt-box {
      background: white;
      border-radius: 14px;
      border: 0.5px solid rgba(0,0,0,0.12);
      padding: 14px;
    }
    .prompt-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 8px;
    }
    #prompt-input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      color: #222;
      resize: none;
      height: 64px;
      line-height: 1.6;
    }
    #prompt-input::placeholder { color: #c8c8c8; }
    .prompt-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 0.5px solid rgba(0,0,0,0.08);
    }
    .tag {
      padding: 4px 10px;
      background: #e8f5e9;
      border-radius: 10px;
      font-size: 11px;
      color: #2e7d32;
      cursor: pointer;
    }
    .tag:hover { background: #c8e6c9; }

    /* 생성 버튼 */
    .gen-btn-wrap {
      padding: 14px 20px 0;
      flex-shrink: 0;
    }
    .gen-btn {
      width: 100%;
      height: 50px;
      background: #334b1b;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .gen-btn:disabled { background: #aaa; cursor: not-allowed; }

    /* 결과 영역 */
    .result-section {
      flex: 1;
      padding: 16px 20px;
      overflow-y: auto;
    }

    /* 로딩 카드 */
    .loading-card {
      background: white;
      border-radius: 20px;
      border: 0.5px solid rgba(0,0,0,0.1);
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(51,75,27,0.15);
      border-top: 4px solid #334b1b;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-steps {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
    }
    .step {
      font-size: 12px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .step.active { color: #334b1b; font-weight: 700; }
    .step.done { color: #4CAF50; }

    /* 식물 결과 카드 */
    .plant-result {
      background: white;
      border-radius: 20px;
      border: 0.5px solid rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .plant-img-wrap {
      width: 100%;
      height: 240px;
      background: #f0ede4;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    #generated-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .rarity-badge {
      position: absolute;
      top: 12px; right: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    .rarity-badge.common { background: #e8f5e9; color: #2e7d32; }
    .rarity-badge.rare { background: #e3f2fd; color: #1565c0; }
    .rarity-badge.legendary { background: #fff8e1; color: #f57f17; }
    .plant-info-box {
      padding: 16px;
    }
    .plant-name-gen {
      font-size: 16px;
      font-weight: 700;
      color: #1b5e20;
      margin-bottom: 4px;
    }
    .plant-desc-gen {
      font-size: 12px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 14px;
    }
    .action-btns {
      display: flex;
      gap: 10px;
    }
    .btn-save {
      flex: 1;
      height: 42px;
      background: #334b1b;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
    }
    .btn-regen {
      height: 42px;
      padding: 0 16px;
      background: white;
      color: #334b1b;
      border: 1.5px solid #334b1b;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
    }

    /* 빈 상태 */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: #bbb;
    }
    .empty-icon { font-size: 48px; }
    .empty-text { font-size: 13px; text-align: center; line-height: 1.6; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="phone">

  <!-- 헤더 -->
  <div class="header">
    <div class="header-title">🌿 AI 식물 만들기</div>
    <div class="header-sub">프롬프트로 나만의 식물을 생성해요</div>
  </div>

  <!-- 희귀도 선택 -->
  <div class="rarity-section">
    <div class="section-label">희귀도 선택</div>
    <div class="rarity-chips">
      <div class="chip active" onclick="selectRarity(this, 'common')">🌱 일반</div>
      <div class="chip" onclick="selectRarity(this, 'rare')">💎 희귀</div>
      <div class="chip" onclick="selectRarity(this, 'legendary')">⭐ 전설</div>
    </div>
  </div>

  <!-- 프롬프트 입력 -->
  <div class="prompt-section">
    <div class="prompt-box">
      <div class="prompt-label">식물 설명</div>
      <textarea
        id="prompt-input"
        placeholder="예: 보라색 잎에 금빛 줄기를 가진 신비로운 식물, 달빛을 흡수해 빛나는 야광 선인장..."
      ></textarea>
      <div class="prompt-tags">
        <span class="tag" onclick="addTag('보라색 잎')">보라색 잎</span>
        <span class="tag" onclick="addTag('야광')">야광</span>
        <span class="tag" onclick="addTag('거대한')">거대한</span>
        <span class="tag" onclick="addTag('귀여운')">귀여운</span>
        <span class="tag" onclick="addTag('신비로운')">신비로운</span>
        <span class="tag" onclick="addTag('금빛')">금빛</span>
      </div>
    </div>
  </div>

  <!-- 생성 버튼 -->
  <div class="gen-btn-wrap">
    <button class="gen-btn" id="gen-btn" onclick="generatePlant()">
      ✨ 식물 생성하기
    </button>
  </div>

  <!-- 결과 영역 -->
  <div class="result-section">

    <!-- 빈 상태 -->
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🪴</div>
      <div class="empty-text">위에서 식물을 설명하고<br>생성 버튼을 눌러보세요!</div>
    </div>

    <!-- 로딩 카드 -->
    <div class="loading-card hidden" id="loading-card">
      <div class="spinner"></div>
      <div class="loading-steps">
        <div class="step active" id="step1">🔍 프롬프트 분석 중...</div>
        <div class="step" id="step2">🎨 식물 이미지 생성 중...</div>
        <div class="step" id="step3">✨ 마무리 중...</div>
      </div>
    </div>

    <!-- 생성된 식물 -->
    <div class="plant-result hidden" id="plant-result">
      <div class="plant-img-wrap">
        <img id="generated-img" alt="생성된 식물">
        <div class="rarity-badge common" id="rarity-badge">🌱 일반</div>
      </div>
      <div class="plant-info-box">
        <div class="plant-name-gen" id="plant-name">식물 이름</div>
        <div class="plant-desc-gen" id="plant-desc">식물 설명</div>
        <div class="action-btns">
          <button class="btn-save" onclick="savePlant()">🌱 내 식물로 저장</button>
          <button class="btn-regen" onclick="generatePlant()">↻ 다시 생성</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
let selectedRarity = 'common';

// 희귀도 선택
function selectRarity(el, rarity) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  selectedRarity = rarity;
}

// 태그 추가
function addTag(tag) {
  const input = document.getElementById('prompt-input');
  input.value = input.value ? input.value + ', ' + tag : tag;
  input.focus();
}

// 식물 이름 생성 (한국어 판타지 이름)
function generatePlantName(prompt) {
  const prefixes = ['드라코', '스파티', '몬스테', '아레테', '루나', '솔라', '비리디'];
  const suffixes = ['블룸', '필루나', '리아', '스텔라', '플로라', '비아', '라이트'];
  const p = prefixes[Math.floor(Math.random() * prefixes.length)];
  const s = suffixes[Math.floor(Math.random() * suffixes.length)];
  return p + s;
}

// 로딩 스텝 애니메이션
async function animateSteps() {
  const steps = ['step1', 'step2', 'step3'];
  for (let i = 0; i < steps.length; i++) {
    await new Promise(r => setTimeout(r, 1200));
    if (i > 0) {
      document.getElementById(steps[i-1]).classList.remove('active');
      document.getElementById(steps[i-1]).classList.add('done');
      document.getElementById(steps[i-1]).textContent =
        ['✅ 프롬프트 분석 완료!', '✅ 이미지 생성 완료!', ''][i-1];
    }
    document.getElementById(steps[i]).classList.add('active');
  }
}

// 식물 생성
async function generatePlant() {
  const promptText = document.getElementById('prompt-input').value.trim();
  if (!promptText) {
    alert('식물을 설명해주세요!');
    return;
  }

  // UI 전환
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('plant-result').classList.add('hidden');
  document.getElementById('loading-card').classList.remove('hidden');
  document.getElementById('gen-btn').disabled = true;

  // 스텝 리셋
  ['step1','step2','step3'].forEach(s => {
    document.getElementById(s).classList.remove('active','done');
  });
  document.getElementById('step1').textContent = '🔍 프롬프트 분석 중...';
  document.getElementById('step2').textContent = '🎨 식물 이미지 생성 중...';
  document.getElementById('step3').textContent = '✨ 마무리 중...';
  document.getElementById('step1').classList.add('active');

  // 스텝 애니메이션 시작
  animateSteps();

async function generatePlant() {
  const promptText = document.getElementById('prompt-input').value.trim();
  if (!promptText) { alert('식물을 설명해주세요!'); return; }

  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('plant-result').classList.add('hidden');
  document.getElementById('loading-card').classList.remove('hidden');
  document.getElementById('gen-btn').disabled = true;

  // 스텝 리셋
  ['step1','step2','step3'].forEach(s => {
    document.getElementById(s).classList.remove('active','done');
  });
  document.getElementById('step1').textContent = '🔍 프롬프트 분석 중...';
  document.getElementById('step2').textContent = '🎨 식물 이미지 생성 중...';
  document.getElementById('step3').textContent = '✨ 마무리 중...';
  document.getElementById('step1').classList.add('active');

  // 로딩 애니메이션만 돌리기
  animateSteps();
  await new Promise(r => setTimeout(r, 3600));

  showResult(null, promptText);
  document.getElementById('gen-btn').disabled = false;
}
    // 결과 표시
    showResult(base64Img, promptText);

  } catch (err) {
    // API 실패 시 플레이스홀더로 대체
    await new Promise(r => setTimeout(r, 3600));
    showResultFallback(promptText);
  }

  document.getElementById('gen-btn').disabled = false;
}
function getPlantImage(rarity) {
  const imageMap = {
    common:    'images/plant1.png',
    rare:      'images/plant2.png',
    legendary: 'images/plant3.png'
  };
  return imageMap[rarity] || 'images/plant1.png';
}

// 결과 표시
function showResult(base64Img, promptText) {
  document.getElementById('loading-card').classList.add('hidden');
  document.getElementById('plant-result').classList.remove('hidden');

  const img = document.getElementById('generated-img');
  img.src = `data:image/png;base64,${base64Img}`;

  const rarityInfo = {
    common: { label: '🌱 일반', cls: 'common' },
    rare: { label: '💎 희귀', cls: 'rare' },
    legendary: { label: '⭐ 전설', cls: 'legendary' }
  };
  const badge = document.getElementById('rarity-badge');
  badge.textContent = rarityInfo[selectedRarity].label;
  badge.className = 'rarity-badge ' + rarityInfo[selectedRarity].cls;

  document.getElementById('plant-name').textContent = generatePlantName(promptText);
  document.getElementById('plant-desc').textContent =
    `"${promptText}" — AI가 생성한 나만의 특별한 식물이에요. ${selectedRarity === 'legendary' ? '전설 등급의 희귀 식물입니다! 🌟' : selectedRarity === 'rare' ? '희귀 등급의 특별한 식물이에요 💎' : '일반 등급 식물이에요 🌱'}`;
}

// 폴백 (API 실패 시)
function showResultFallback(promptText) {
  showResult(null, promptText);
}

// 저장
function savePlant() {
  const name = document.getElementById('plant-name').textContent;
  localStorage.setItem('tium_plant_name', name);
  localStorage.setItem('tium_plant_rarity', selectedRarity);
  alert(`${name} 식물이 저장됐어요! 🌱`);
  window.location.href = 'chatbot.html';
}
</script>
</body>
</html>
